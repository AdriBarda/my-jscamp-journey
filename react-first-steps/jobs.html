<!doctype html>
<html lang="es">
  <head>
    <title>MyDevJobs - Jobs</title>
    <meta charset="UTF-8" />
    <meta name="description" content="List of job offers with filtering to find your dream job." />
    <link rel="stylesheet" href="./styles.css" />

    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <header>
      <h1>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="icon icon-tabler icons-tabler-outline icon-tabler-device-imac-code"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M11.5 17h-7.5a1 1 0 0 1 -1 -1v-12a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v9" />
          <path d="M3 13h18" />
          <path d="M8 21h3.5" />
          <path d="M10 17l-.5 4" />
          <path d="M20 21l2 -2l-2 -2" />
          <path d="M17 17l-2 2l2 2" />
        </svg>
        MyDevJobs
      </h1>
      <nav>
        <a href="/react-first-steps/">Home</a>
        <a href="jobs.html">Job Offers</a>
        <a href="">Companies</a>
        <a href="">Salaries</a>
      </nav>
      <div>
        <devjobs-avatar></devjobs-avatar>
        <!-- <a href="">Login</a> -->
      </div>
    </header>
    <main>
      <section class="jobs-search">
        <h1>Find the next step in your career</h1>
        <p>Explore thousands of opportunities in the IT industry.</p>

        <form id="job-search-form" role="search">
          <div class="search-bar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-search"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
              <path d="M21 21l-6 -6" />
            </svg>
            <input
              id="job-searchbar"
              name="search"
              required
              type="text"
              placeholder="Search a job by title, skill or company"
            />
          </div>

          <div class="search-filters">
            <select name="tecnology" id="filter-tecnology">
              <option value="">All Technologies</option>
              <optgroup label="Frontend">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="react">React</option>
                <option value="vue">Vue</option>
              </optgroup>

              <optgroup label="Backend">
                <option value="node">Node.js</option>
                <option value="python">Python</option>
                <option value="php">PHP</option>
                <option value="java">Java</option>
              </optgroup>

              <optgroup label="DB">
                <option value="mysql">MySQL</option>
                <option value="mongodb">MongoDB</option>
                <option value="postgresql">PostgreSQL</option>
              </optgroup>
            </select>

            <select name="location" id="filter-location">
              <option value="">All Locations</option>
              <optgroup label="Spain">
                <option value="barcelona">Barcelona</option>
                <option value="madrid">Madrid</option>
                <option value="valencia">Valencia</option>
              </optgroup>
              <optgroup label="Mexico">
                <option value="cdmx">Mexico City</option>
                <option value="guadalajara">Guadalajara</option>
                <option value="monterrey">Monterrey</option>
              </optgroup>
              <hr />
              <option value="remote">🌍 Remote</option>
            </select>

            <select name="experience-level" id="filter-experience-level">
              <option value="">All Levels</option>
              <option value="junior">Junior</option>
              <option value="mid">Mid-level</option>
              <option value="senior">Senior</option>
              <option value="lead">Lead</option>
              <hr />
              <option value="internship">Internship</option>
              <option value="freelance">Freelance</option>
            </select>
          </div>
        </form>
        <span id="selected-filters"></span>
        <span id="results-shown"></span>
      </section>

      <section class="jobs-results">
        <h2>Search results</h2>
        <div class="jobs-listing"></div>

        <nav class="pagination"></nav>
      </section>
    </main>
    <footer>
      <small> &copy; MyDevJobs 2026. Almost all rights reserved </small>
    </footer>
  </body>
</html>
